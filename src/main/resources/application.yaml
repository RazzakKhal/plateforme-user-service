spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  cloud:
    function:
      definition: saveFormula
    stream:
      defaultBinder: kafka
      kafka:
        binder:
          brokers:
            - ${SPRING_KAFKA:localhost:29092}
      bindings:
        saveFormula-in-0:
          destination: send-communication
          group: user-service

        send-forgot-password-link-out-0:
          destination: password-reset-requested   # nom du topic Kafka
          contentType: application/json
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
  config:
    import: "optional:configserver:http://localhost:8071/"
  profiles:
    active:
      - "prod"
  application:
    name: user-service
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-target: target/schema.sql
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update
    show-sql: false
  datasource:
    url: ${SPRING_DATASOURCE_URL_USER_SERVICE:jdbc:postgresql://localhost:5432/autoecole-user}
    username: ${SPRING_POSTGRES_USERNAME:postgres}
    password: ${SPRING_POSTGRES_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

server:
  port: 3001

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  health:
    probes:
      enabled: true
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: "user-service"
    description: "user service microservice"

logging:
  file:
    name: ${LOG_FILE_NAME:logs/user-service.log}
  structured:
    format:
      console: ecs
      file: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${SPRING_PROFILES_ACTIVE:local}
  level:
    root: INFO
